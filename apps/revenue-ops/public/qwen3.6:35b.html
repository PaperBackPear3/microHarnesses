<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Ops</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4ea; min-height: 100vh; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 20px; font-weight: 600; color: #58a6ff; }
    header .badge { background: #238636; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
    .card-header h2 { font-size: 15px; font-weight: 600; color: #c9d1d9; }
    .card-header .icon { font-size: 16px; }
    .card-body { padding: 18px; }
    label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: 8px 12px; font-size: 14px; font-family: inherit; margin-bottom: 12px; transition: border-color 0.15s; }
    input:focus, textarea:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
    textarea { resize: vertical; min-height: 70px; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; }
    button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
    button:hover { background: #30363d; border-color: #8b949e; }
    button.primary { background: #238636; border-color: #2ea043; color: #fff; }
    button.primary:hover { background: #2ea043; }
    button.accent { background: #1f6feb; border-color: #388bfd; color: #fff; }
    button.accent:hover { background: #388bfd; }
    .btn-row { display: flex; gap: 8px; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 14px; font-size: 12px; line-height: 1.6; overflow-x: auto; min-height: 48px; color: #c9d1d9; white-space: pre-wrap; word-break: break-word; }
    pre.empty { color: #484f58; font-style: italic; }
    .full-width { grid-column: 1 / -1; }
    .kpis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .kpi-card { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 14px; text-align: center; }
    .kpi-card .value { font-size: 28px; font-weight: 700; color: #58a6ff; }
    .kpi-card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }
    footer { text-align: center; padding: 24px; color: #484f58; font-size: 12px; border-top: 1px solid #30363d; margin-top: 24px; }
  </style>
</head>
<body>
  <header>
    <h1>&#9881; Revenue Ops</h1>
    <span class="badge">LIVE</span>
  </header>

  <div class="container">
    <!-- Health -->
    <div class="card">
      <div class="card-header"><span class="icon">&#9889;</span><h2>Health Check</h2></div>
      <div class="card-body">
        <div class="btn-row"><button class="primary" onclick="checkHealth()">Check Health</button></div>
        <pre id="health-output" class="empty">Not checked yet</pre>
      </div>
    </div>

    <!-- KPIs -->
    <div class="card">
      <div class="card-header"><span class="icon">&#128200;</span><h2>KPI Dashboard</h2></div>
      <div class="card-body">
        <div class="btn-row"><button class="accent" onclick="fetchKpis()">Refresh KPIs</button></div>
        <div id="kpis-grid" class="kpis-grid"></div>
        <pre id="kpis-output" class="empty">No data yet</pre>
      </div>
    </div>

    <!-- Ingest Event -->
    <div class="card full-width">
      <div class="card-header"><span class="icon">&#128230;</span><h2>Inbound Event</h2></div>
      <div class="card-body">
        <label for="event-body">JSON Payload</label>
        <textarea id="event-body" placeholder='{"type":"payment_received","accountId":"acc_123","amount":500}'>{}</textarea>
        <div class="btn-row"><button class="primary" onclick="sendEvent()">Send Event</button></div>
        <pre id="event-output" class="empty">Awaiting event...</pre>
      </div>
    </div>

    <!-- Retention -->
    <div class="card">
      <div class="card-header"><span class="icon">&#128176;</span><h2>Retention Campaign</h2></div>
      <div class="card-body">
        <label for="retention-id">Account ID</label>
        <input id="retention-id" placeholder="e.g. acc_456">
        <div class="btn-row"><button class="accent" onclick="runRetention()">Run Retention</button></div>
        <pre id="retention-output" class="empty">No campaign run yet</pre>
      </div>
    </div>

    <!-- Collections -->
    <div class="card">
      <div class="card-header"><span class="icon">&#128179;</span><h2>Collections Campaign</h2></div>
      <div class="card-body">
        <label for="collection-id">Debtor ID</label>
        <input id="collection-id" placeholder="e.g. debtor_789">
        <div class="btn-row"><button class="accent" onclick="runCollections()">Run Collections</button></div>
        <pre id="collections-output" class="empty">No campaign run yet</pre>
      </div>
    </div>

    <!-- Case Lookup -->
    <div class="card full-width">
      <div class="card-header"><span class="icon">&#128196;</span><h2>Case Lookup</h2></div>
      <div class="card-body">
        <label for="case-id">Case ID</label>
        <input id="case-id" placeholder="e.g. case_abc">
        <div class="btn-row"><button class="primary" onclick="getCase()">Lookup Case</button></div>
        <pre id="case-output" class="empty">No case loaded yet</pre>
      </div>
    </div>
  </div>

  <footer>Revenue Ops &mdash; Powered by Micro Harnesses</footer>
  <script src="script.js"></script>
</body>
</html>
