name: Release

on:
  push:
    tags:
      - 'v*'

# Required for npm trusted publishing (OIDC). No NPM_TOKEN is used.
# Configure a trusted publisher for each package on npmjs.com:
#   Package > Settings > Trusted Publisher > GitHub Actions
#   Repository: PaperBackPear3/microHarnesses
#   Workflow filename: release.yml
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC) requires npm >= 11.5.1. npm 12 on the
      # hosted toolcache can miss the sigstore module used for provenance, so
      # install it globally alongside npm to keep publish resolution stable.
      - run: npm install -g npm@latest sigstore@latest
      - run: npm ci
      - run: node scripts/release-preflight.mjs packages/core plugins/example-tools plugins/basic-tools plugins/sqlite-todos apps/cli
      - run: npm run build
      - run: npm test
      - run: |
          for pkg in packages/core plugins/example-tools plugins/basic-tools plugins/sqlite-todos apps/cli; do
            echo "Publishing $pkg"
            # Provenance is generated automatically under trusted publishing.
            (cd "$pkg" && npm publish --access public)
          done
